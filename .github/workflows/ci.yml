name: build-and-test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: test (node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20
          - 22

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Eval contracts
        run: npm run eval:contracts

      - name: Frozen eval fixtures
        run: npm run eval:fixtures

      - name: Smoke test
        run: npm run smoke

      - name: Package dry run
        run: npm pack --dry-run

  build-and-test:
    name: build-and-test
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: Verify matrix result
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Node matrix did not pass: ${{ needs.test.result }}"
            exit 1
          fi
          echo "Node matrix passed"
